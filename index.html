<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Brushspace</title>
    <meta
      name="description"
      content="Paint in thin air, together - a WebXR 3D painting app based on Open Brush."
    />
    <style>
      html,
      body,
      #scene-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background-color: black;
      }

      #enter-vr-button {
        position: fixed;
        bottom: 78px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: none;
        padding: 14px 36px;
        background: #f5f5f0;
        color: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.2px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #enter-vr-button:hover {
        background: #ffffff;
      }

      #landing-footer {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: none;
        align-items: center;
        gap: 14px;
      }

      #landing-footer img {
        height: 24px;
        width: auto;
        opacity: 0.95;
        filter: drop-shadow(0 1px 8px rgba(8, 18, 26, 0.5));
      }

      #landing-version {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.07em;
        color: #f7f5ef;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(247, 245, 239, 0.5);
        border-radius: 999px;
        padding: 4px 12px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <button id="enter-vr-button" type="button">ENTER VR</button>
    <div id="landing-footer">
      <img src="/elixr.png" alt="Elixr Games" />
      <span id="landing-version">v0.0.0</span>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
