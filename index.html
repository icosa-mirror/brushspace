<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>Brushspace</title>
    <meta
      name="description"
      content="Paint in thin air, together — a WebXR 3D painting app by EliXR Games"
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0e0f1c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />

    <meta property="og:title" content="Brushspace — paint in thin air, together" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brushspace.elixr.games" />
    <meta
      property="og:image"
      content="https://brushspace.elixr.games/og-image.png"
    />
    <meta
      property="og:description"
      content="Paint in thin air, together — a WebXR 3D painting app by EliXR Games"
    />
    <meta property="og:site_name" content="Brushspace" />
    <meta property="og:locale" content="en_US" />
    <style>
      html,
      body,
      #scene-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background-color: black;
      }

      #enter-vr-button {
        position: fixed;
        bottom: 78px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: none;
        padding: 14px 36px;
        background: #f5f5f0;
        color: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.2px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #enter-vr-button:hover {
        background: #ffffff;
      }

      #landing-footer {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: none;
        align-items: center;
        gap: 14px;
      }

      #landing-footer img {
        height: 24px;
        width: auto;
        opacity: 0.95;
        filter: drop-shadow(0 1px 8px rgba(8, 18, 26, 0.5));
      }

      #landing-version {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.07em;
        color: #f7f5ef;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(247, 245, 239, 0.5);
        border-radius: 999px;
        padding: 4px 12px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        background: #0e0f1c;
        transition: opacity 0.45s ease;
      }

      #loading-screen.done {
        opacity: 0;
        pointer-events: none;
      }

      #loading-screen img {
        width: min(420px, 72vw);
        height: auto;
      }

      #loading-bar {
        width: min(260px, 56vw);
        height: 4px;
        border-radius: 999px;
        background: rgba(247, 245, 239, 0.18);
        overflow: hidden;
      }

      #loading-bar-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: #f5f5f0;
        transition: width 0.25s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <button id="enter-vr-button" type="button">ENTER VR</button>
    <div id="landing-footer">
      <img src="/elixr.png" alt="Elixr Games" />
      <span id="landing-version">v0.0.0</span>
    </div>
    <div id="loading-screen">
      <img src="/openbrush/intro/brushspace.png" alt="Brushspace" />
      <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
