<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Brushspace</title>
    <meta
      name="description"
      content="Paint in thin air, together - a WebXR 3D painting app based on Open Brush."
    />
    <style>
      html,
      body,
      #scene-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background-color: black;
      }

      #enter-vr-button {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: none;
        padding: 14px 36px;
        background: #f5f5f0;
        color: #0f172a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.2px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #enter-vr-button:hover {
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <button id="enter-vr-button" type="button">ENTER VR</button>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
